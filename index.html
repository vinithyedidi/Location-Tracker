<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Museum Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Courier New', monospace; background: #1a1a1a; color: #f0ece0; min-height: 100vh; }
  .app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; }

  .status-bar { background: #1a1a1a; border-bottom: 2px solid #f0ece0; padding: 12px 16px; flex-shrink: 0; }
  .status-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #888; margin-bottom: 4px; }
  .status-content { display: flex; align-items: center; gap: 10px; }
  .status-object { font-size: 14px; font-weight: bold; color: #f0ece0; flex: 1; line-height: 1.3; }
  .status-object.empty { color: #555; font-style: italic; font-weight: normal; font-size: 13px; }
  .status-timer { font-size: 20px; font-weight: bold; color: #c8b97a; letter-spacing: 0.05em; min-width: 60px; text-align: right; }
  .leave-btn { background: #c8b97a; color: #1a1a1a; border: none; padding: 8px 12px; font-family: 'Courier New', monospace; font-size: 11px; font-weight: bold; letter-spacing: 0.1em; cursor: pointer; text-transform: uppercase; flex-shrink: 0; }
  .leave-btn:hover { background: #e0d090; }
  .leave-btn.hidden { display: none; }

  .tabs { display: flex; border-bottom: 1px solid #333; flex-shrink: 0; }
  .tab { flex: 1; padding: 10px; text-align: center; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; color: #666; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab.active { color: #f0ece0; border-bottom-color: #c8b97a; }

  .panel { flex: 1; overflow-y: auto; }
  .panel.hidden { display: none; }

  .search-wrap { padding: 10px 12px 4px; }
  .search { width: 100%; background: #2a2a2a; border: 1px solid #444; color: #f0ece0; padding: 8px 10px; font-family: 'Courier New', monospace; font-size: 13px; outline: none; }
  .search::placeholder { color: #555; }
  .search:focus { border-color: #c8b97a; }

  .object-item { padding: 14px 16px; cursor: pointer; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .object-item:hover { background: #252525; }
  .object-item.active { background: #2a2500; border-left: 3px solid #c8b97a; padding-left: 13px; }
  .object-name { font-size: 14px; }
  .object-sub { font-size: 11px; color: #666; margin-top: 2px; }
  .object-item.active .object-name { color: #c8b97a; font-weight: bold; }
  .now-badge { font-size: 10px; letter-spacing: 0.1em; color: #c8b97a; text-transform: uppercase; flex-shrink: 0; }

  .log-empty { padding: 40px 16px; text-align: center; color: #555; font-size: 13px; line-height: 1.6; }
  .log-item { padding: 12px 16px; border-bottom: 1px solid #222; display: flex; align-items: flex-start; gap: 10px; }
  .log-index { font-size: 11px; color: #555; min-width: 18px; padding-top: 2px; }
  .log-body { flex: 1; min-width: 0; }
  .log-name { font-size: 13px; font-weight: bold; margin-bottom: 3px; }
  .log-times { font-size: 11px; color: #888; letter-spacing: 0.04em; }
  .log-duration { font-size: 11px; color: #c8b97a; margin-top: 2px; }
  .log-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .log-btn { background: none; border: 1px solid #333; color: #888; cursor: pointer; font-size: 11px; padding: 3px 7px; font-family: 'Courier New', monospace; }
  .log-btn:hover { border-color: #c8b97a; color: #c8b97a; }
  .log-btn.del:hover { border-color: #e05555; color: #e05555; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal-overlay.hidden { display: none; }
  .modal { background: #222; border: 1px solid #444; padding: 20px; width: 100%; max-width: 420px; }
  .modal-title { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: #888; margin-bottom: 16px; }
  .modal label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #888; display: block; margin-bottom: 4px; margin-top: 12px; }
  .modal select, .modal input[type=text] { width: 100%; background: #2a2a2a; border: 1px solid #444; color: #f0ece0; padding: 8px 10px; font-family: 'Courier New', monospace; font-size: 13px; outline: none; }
  .modal select:focus, .modal input[type=text]:focus { border-color: #c8b97a; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-save { flex: 1; background: #c8b97a; color: #1a1a1a; border: none; padding: 10px; font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em; }
  .modal-save:hover { background: #e0d090; }
  .modal-cancel { background: none; border: 1px solid #444; color: #888; padding: 10px 16px; font-family: 'Courier New', monospace; font-size: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em; }
  .modal-cancel:hover { border-color: #888; color: #f0ece0; }

  .export-bar { padding: 12px 16px; border-top: 1px solid #333; flex-shrink: 0; display: flex; gap: 10px; align-items: center; }
  .count-badge { font-size: 11px; color: #888; white-space: nowrap; }
  .export-btn { flex: 1; background: #f0ece0; color: #1a1a1a; border: none; padding: 11px; font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; letter-spacing: 0.12em; cursor: pointer; text-transform: uppercase; }
  .export-btn:hover { background: #c8b97a; }
  .export-btn:disabled { background: #2a2a2a; color: #555; cursor: default; }
</style>
</head>
<body>
<div class="app">

  <div class="status-bar">
    <div class="status-label">Currently at</div>
    <div class="status-content">
      <div class="status-object empty" id="statusObj">— nothing selected —</div>
      <div class="status-timer" id="statusTimer" style="display:none">00:00</div>
      <button class="leave-btn hidden" id="leaveBtn" onclick="leaveObject()">Leave</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-objects" onclick="switchTab('objects')">Objects</div>
    <div class="tab" id="tab-log" onclick="switchTab('log')">Log</div>
  </div>

  <div class="panel" id="panel-objects">
    <div class="search-wrap">
      <input class="search" id="searchInput" placeholder="Search objects..." oninput="renderObjects()" />
    </div>
    <div id="objectListEl"></div>
  </div>

  <div class="panel hidden" id="panel-log">
    <div id="logEl"></div>
  </div>

  <div class="export-bar">
    <span class="count-badge" id="countBadge">0 visits logged</span>
    <button class="export-btn" id="exportBtn" onclick="exportCSV()" disabled>Export CSV</button>
  </div>

</div>

<div class="modal-overlay hidden" id="editModal">
  <div class="modal">
    <div class="modal-title">Edit Visit</div>
    <label>Object</label>
    <select id="editObject"></select>
    <label>Arrival Time (HH:MM:SS)</label>
    <input type="text" id="editArrival" placeholder="e.g. 14:03:22" />
    <label>Departure Time (HH:MM:SS)</label>
    <input type="text" id="editDeparture" placeholder="e.g. 14:07:45" />
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeEdit()">Cancel</button>
      <button class="modal-save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<script>
const STOPS = [
  { name: "Object 1", location: "Floor 1" },
  { name: "Object 2", location: "Floor 1" },
  { name: "Object 3", location: "Floor 1" },
  { name: "Object 4", location: "Floor 1" },
  { name: "Object 5", location: "Floor 1" },
];

let activeObject = null;
let log = [];
let timerInterval = null;
let editIdx = null;

function fmt(d) { return d.toTimeString().slice(0, 8); }
function elapsed(startTs) {
  const s = Math.floor((Date.now() - startTs) / 1000);
  return String(Math.floor(s / 60)).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
}
function durStr(ms) {
  const s = Math.floor(ms / 1000), m = Math.floor(s / 60);
  return m > 0 ? m + 'm ' + (s % 60) + 's' : (s % 60) + 's';
}
function durFromTimes(start, end) {
  const toSec = t => { const p = t.split(':').map(Number); return p[0]*3600 + p[1]*60 + (p[2]||0); };
  const diff = toSec(end) - toSec(start);
  if (isNaN(diff) || diff < 0) return '?';
  const m = Math.floor(diff / 60), s = diff % 60;
  return m > 0 ? m + 'm ' + s + 's' : s + 's';
}

function arriveAt(idx) {
  if (activeObject) leaveObject(false);
  const stop = STOPS[idx];
  const now = new Date();
  activeObject = { name: stop.name, location: stop.location, startTime: fmt(now), startTs: Date.now() };
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    document.getElementById('statusTimer').textContent = elapsed(activeObject.startTs);
  }, 1000);
  updateStatus();
  renderObjects();
}

function leaveObject(rerender = true) {
  if (!activeObject) return;
  const now = new Date();
  log.push({ name: activeObject.name, location: activeObject.location, startTime: activeObject.startTime, endTime: fmt(now), duration: durStr(Date.now() - activeObject.startTs) });
  activeObject = null;
  clearInterval(timerInterval);
  if (rerender) { updateStatus(); renderObjects(); renderLog(); }
  updateExport();
}

function updateStatus() {
  const obj = document.getElementById('statusObj');
  const timer = document.getElementById('statusTimer');
  const btn = document.getElementById('leaveBtn');
  if (activeObject) {
    obj.textContent = activeObject.name;
    obj.classList.remove('empty');
    timer.style.display = 'block';
    timer.textContent = '00:00';
    btn.classList.remove('hidden');
  } else {
    obj.textContent = '— nothing selected —';
    obj.classList.add('empty');
    timer.style.display = 'none';
    btn.classList.add('hidden');
  }
}

function renderObjects() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.getElementById('objectListEl').innerHTML = STOPS
    .filter(s => s.name.toLowerCase().includes(q) || s.location.toLowerCase().includes(q))
    .map((s, i) => {
      const isActive = activeObject && activeObject.name === s.name;
      return `<div class="object-item${isActive ? ' active' : ''}" onclick="arriveAt(${STOPS.indexOf(s)})">
        <div>
          <div class="object-name">${s.name}</div>
          <div class="object-sub">${s.location}</div>
        </div>
        ${isActive ? '<span class="now-badge">NOW</span>' : ''}
      </div>`;
    }).join('');
}

function renderLog() {
  const el = document.getElementById('logEl');
  if (log.length === 0) {
    el.innerHTML = '<div class="log-empty">No visits logged yet.<br>Tap an object when the participant arrives.</div>';
    return;
  }
  el.innerHTML = [...log].reverse().map((entry, i) => {
    const idx = log.length - 1 - i;
    return `<div class="log-item">
      <span class="log-index">${idx + 1}</span>
      <div class="log-body">
        <div class="log-name">${entry.name}</div>
        <div class="log-times">${entry.startTime} to ${entry.endTime}</div>
        <div class="log-duration">${entry.duration}</div>
      </div>
      <div class="log-actions">
        <button class="log-btn" onclick="openEdit(${idx})">Edit</button>
        <button class="log-btn del" onclick="deleteLog(${idx})">Del</button>
      </div>
    </div>`;
  }).join('');
}

function deleteLog(idx) {
  if (confirm('Delete this entry?')) { log.splice(idx, 1); renderLog(); updateExport(); }
}

function openEdit(idx) {
  editIdx = idx;
  const entry = log[idx];
  document.getElementById('editObject').innerHTML = STOPS.map(s => `<option value="${s.name}" ${s.name === entry.name ? 'selected' : ''}>${s.name}</option>`).join('');
  document.getElementById('editArrival').value = entry.startTime;
  document.getElementById('editDeparture').value = entry.endTime;
  document.getElementById('editModal').classList.remove('hidden');
}

function closeEdit() { document.getElementById('editModal').classList.add('hidden'); editIdx = null; }

function saveEdit() {
  const name = document.getElementById('editObject').value;
  const stop = STOPS.find(s => s.name === name);
  const startTime = document.getElementById('editArrival').value.trim();
  const endTime = document.getElementById('editDeparture').value.trim();
  log[editIdx] = { name, location: stop ? stop.location : '', startTime, endTime, duration: durFromTimes(startTime, endTime) };
  closeEdit();
  renderLog();
}

function updateExport() {
  const n = log.length;
  document.getElementById('countBadge').textContent = n + ' visit' + (n !== 1 ? 's' : '') + ' logged';
  document.getElementById('exportBtn').disabled = n === 0;
}

function exportCSV() {
  const rows = [['#', 'Object', 'Location', 'Arrival', 'Departure', 'Duration']];
  log.forEach((e, i) => rows.push([i + 1, e.name, e.location, e.startTime, e.endTime, e.duration]));
  const csv = rows.map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = 'session_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function switchTab(tab) {
  document.getElementById('panel-objects').classList.toggle('hidden', tab !== 'objects');
  document.getElementById('panel-log').classList.toggle('hidden', tab !== 'log');
  document.getElementById('tab-objects').classList.toggle('active', tab === 'objects');
  document.getElementById('tab-log').classList.toggle('active', tab === 'log');
  if (tab === 'log') renderLog();
}

renderObjects();
updateExport();
</script>
</body>
</html>
